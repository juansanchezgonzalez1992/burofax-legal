<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2B4B"/>
      <stop offset="100%" style="stop-color:#111E33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#E0BC6A"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#C9A84C;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Gold top bar -->
  <rect width="1200" height="5" fill="url(#accent)"/>

  <!-- Logo mark -->
  <rect x="80" y="72" width="44" height="44" rx="8" fill="#1B2B4B" stroke="#C9A84C" stroke-width="1.5"/>
  <line x1="91" y1="87" x2="113" y2="87" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="91" y1="94" x2="107" y2="94" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="91" y1="101" x2="110" y2="101" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Brand name -->
  <text x="138" y="100" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="1">Burofax Legal</text>

  <!-- Divider -->
  <rect x="80" y="138" width="120" height="2" rx="1" fill="#C9A84C"/>

  <!-- Main headline -->
  <text x="80" y="240" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Burofax redactado</text>
  <text x="80" y="308" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">por abogado</text>

  <!-- Subtitle -->
  <text x="80" y="372" font-family="system-ui, sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.72)">Reclamaciones, alquileres e incumplimientos. 100% online.</text>

  <!-- Price pill -->
  <rect x="80" y="415" width="210" height="52" rx="26" fill="rgba(201,168,76,0.15)" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="185" y="448" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#C9A84C" text-anchor="middle">Desde 179 € IVA inc.</text>

  <!-- Features row -->
  <circle cx="330" cy="442" r="4" fill="#C9A84C"/>
  <text x="344" y="448" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">Precio cerrado</text>

  <circle cx="520" cy="442" r="4" fill="#C9A84C"/>
  <text x="534" y="448" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">24/48 h laborables</text>

  <circle cx="730" cy="442" r="4" fill="#C9A84C"/>
  <text x="744" y="448" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">Sin desplazamientos</text>

  <!-- Bottom domain -->
  <text x="80" y="570" font-family="system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.35)" letter-spacing="1">burofaxlegal.es</text>

  <!-- Right decorative element -->
  <rect x="940" y="180" width="180" height="270" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(201,168,76,0.2)" stroke-width="1.5"/>
  <rect x="940" y="180" width="180" height="4" rx="2" fill="url(#accent)"/>
  <text x="1030" y="270" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#FFFFFF" text-anchor="middle">179€</text>
  <text x="1030" y="300" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">IVA incluido</text>
  <line x1="960" y1="320" x2="1100" y2="320" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1030" y="352" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.45)" text-anchor="middle">Redacción jurídica</text>
  <text x="1030" y="372" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.45)" text-anchor="middle">+ envío incluido</text>
  <text x="1030" y="410" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.45)" text-anchor="middle">Sin compromiso inicial</text>
</svg>
